services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hadith
      POSTGRES_PASSWORD: hadith
      POSTGRES_DB: hadith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadith"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://hadith:hadith@db:5432/hadith
      OLLAMA_API_BASE: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
  ollama:
